<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js 正方体展开</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 400px;
            height: 400px;
            border: 1px solid #ccc;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .face {
            stroke: #333;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <h1>D3.js 正方体展开效果</h1>
    <div class="container" id="cube-container"></div>
    <button id="toggle-btn">展开/收起</button>
    <script src="main.js"></script>
</body>
</html>
